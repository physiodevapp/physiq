<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Metrónomo · PhysiQ</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    :root {
      --bg:         #0a0d12;
      --card:       #111620;
      --border:     #232d45;
      --border2:    #2d3a58;
      --text:       #e8edf2;
      --text2:      #8aa4bc;
      --text3:      #5a6e8a;
      --accent:     #f59e0b;
      --accent-lo:  rgba(245,158,11,0.12);
      --accent-mid: rgba(245,158,11,0.55);
      --accent-bar: rgba(245,158,11,0.85);
      --accent-empty: rgba(245,158,11,0.07);
    }

    html, body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      height: 100%; overflow: hidden;
    }

    .app {
      display: flex; flex-direction: column;
      height: 100dvh; overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    .hdr {
      display: flex; align-items: center; gap: 12px;
      padding: 0.9rem 1.25rem 0.65rem;
      flex-shrink: 0;
    }

    .back-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .back-btn:hover { border-color: var(--border2); color: var(--text); }

    .hdr-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem; font-weight: 400; color: var(--text);
    }

    /* ── Main content ───────────────────────────────────── */
    .content {
      flex: 1; display: flex; flex-direction: column;
      gap: 1.1rem; padding: 0 1.25rem 0.5rem;
      min-height: 0;
    }

    /* ── Pulse card ─────────────────────────────────────── */
    .pulse-card {
      flex: 1; min-height: 0;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.1rem 1.1rem 0.9rem;
      display: flex; flex-direction: column; gap: 0.9rem;
      position: relative; overflow: hidden;
    }
    .pulse-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: var(--accent); opacity: 0.55;
    }

    /* ── Pulse grid ─────────────────────────────────────── */
    .pulse-grid {
      flex: 1; min-height: 0;
      display: grid; gap: 5px;
    }

    /* Each bar is a container; the fill grows from the bottom */
    .pulse-bar {
      border-radius: 7px;
      background: var(--accent-empty);
      min-height: 0;
      cursor: ns-resize;
      touch-action: none;
      user-select: none;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      width: 100%;
      border-radius: 7px;
      background: var(--accent-mid);
      /* transition disabled during drag, re-enabled after */
      transition: height 0.1s ease, background 0.06s ease, box-shadow 0.06s ease;
    }

    /* Height determined by data-intensity (0–3) */
    .pulse-bar[data-intensity="0"] .bar-fill { height: 0%; }
    .pulse-bar[data-intensity="1"] .bar-fill { height: 33%; }
    .pulse-bar[data-intensity="2"] .bar-fill { height: 67%; }
    .pulse-bar[data-intensity="3"] .bar-fill { height: 100%; }

    /* Beat-state classes applied to the bar, affect the fill */
    .pulse-bar.played  .bar-fill { background: rgba(245,158,11,0.15); }
    .pulse-bar.current .bar-fill { background: var(--accent-bar); }
    .pulse-bar.flash   .bar-fill {
      background: #fff;
      box-shadow: 0 0 16px rgba(245,158,11,0.75);
    }
    /* For intensity-0 bars: flash the container itself (very subtly) */
    .pulse-bar[data-intensity="0"].flash {
      background: rgba(245,158,11,0.18);
      transition: background 0.06s ease;
    }
    .pulse-bar[data-intensity="0"] { transition: background 0.25s ease; }

    /* ── Pulses row ─────────────────────────────────────── */
    .pulses-row {
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }

    .pulses-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem; color: var(--text2);
      white-space: nowrap; min-width: 70px;
    }
    .pulses-label strong { color: var(--text); font-weight: 500; }

    .sound-btn {
      width: 36px; height: 36px; border-radius: 9px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .sound-btn:hover { border-color: var(--accent); color: var(--accent); }
    .sound-btn.on    { border-color: rgba(245,158,11,0.45); color: var(--accent); background: var(--accent-lo); }

    /* ── BPM section ────────────────────────────────────── */
    .bpm-section {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.6rem; flex-shrink: 0;
    }

    .bpm-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.14em;
    }

    .bpm-row {
      display: flex; align-items: center; gap: 1.25rem;
      width: 100%; justify-content: center;
    }

    .bpm-btn {
      width: 46px; height: 46px; border-radius: 50%;
      border: none; background: var(--card);
      color: var(--text2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
      user-select: none; flex-shrink: 0;
    }
    .bpm-btn:hover  { background: var(--border); color: var(--text); }
    .bpm-btn:active { transform: scale(0.88); }

    .bpm-value {
      font-family: 'Outfit', sans-serif;
      font-size: 4.2rem; font-weight: 300;
      color: var(--text); letter-spacing: -0.03em;
      min-width: 5.5rem; text-align: center; line-height: 1;
    }

    .tempo-name {
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem; font-weight: 500; color: var(--text);
    }

    /* ── Sliders ─────────────────────────────────────────── */
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px; border-radius: 2px; outline: none;
      cursor: pointer;
      background: linear-gradient(
        to right,
        var(--accent) 0%,
        var(--accent) var(--fill, 25%),
        rgba(255,255,255,0.08) var(--fill, 25%)
      );
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
      border: 2.5px solid var(--bg);
      box-shadow: 0 1px 5px rgba(0,0,0,0.5);
      transition: transform 0.08s;
    }
    input[type="range"]::-webkit-slider-thumb:active { transform: scale(1.2); }
    input[type="range"]::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--accent); border: 2.5px solid var(--bg);
      cursor: pointer;
    }

    .bpm-slider { width: 100%; }

    /* ── Bottom bar ──────────────────────────────────────── */
    .bottom-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 1.75rem calc(env(safe-area-inset-bottom, 0px) + 1rem);
      flex-shrink: 0;
    }

    .icon-btn {
      width: 46px; height: 46px; border-radius: 50%;
      border: none; background: transparent;
      color: var(--text3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:hover  { color: var(--text2); background: rgba(255,255,255,0.06); }
    .icon-btn:active { background: rgba(255,255,255,0.1); }
    .icon-btn.tapped { color: var(--accent); }

    .play-btn {
      width: 62px; height: 62px; border-radius: 17px;
      border: none; background: var(--accent);
      color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s, transform 0.08s, background 0.2s;
      box-shadow: 0 4px 20px rgba(245,158,11,0.32);
      -webkit-tap-highlight-color: transparent;
    }
    .play-btn:hover  { opacity: 0.88; }
    .play-btn:active { transform: scale(0.93); }
    .play-btn.playing {
      background: var(--border2);
      box-shadow: none;
    }

    /* ── Settings overlay ───────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(10,13,18,0.78);
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .settings-sheet {
      width: 100%;
      background: var(--card);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 0 1.25rem calc(env(safe-area-inset-bottom, 0px) + 1.5rem);
      display: flex; flex-direction: column; gap: 0.9rem;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
    }
    .overlay.open .settings-sheet { transform: translateY(0); }

    .sheet-hdr {
      display: flex; flex-direction: column; gap: 0.5rem;
      padding: 10px 0 0.9rem;
      border-bottom: 1px solid var(--border);
    }
    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border2); border-radius: 2px;
      margin: 0 auto;
    }
    .sheet-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem; color: var(--text); font-weight: 400;
    }
    .settings-group-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.67rem; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-top: 0.15rem;
    }
    .sound-options { display: flex; flex-direction: column; gap: 6px; }
    .sound-opt {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); font-size: 0.87rem;
      cursor: pointer; text-align: left; width: 100%;
      font-family: 'Outfit', sans-serif;
      transition: border-color 0.15s, color 0.15s;
    }
    .sound-opt.active { border-color: rgba(245,158,11,0.4); color: var(--accent); }
    .sound-opt-dot {
      width: 8px; height: 8px; border-radius: 50%;
      border: 2px solid currentColor; flex-shrink: 0;
    }
    .sound-opt.active .sound-opt-dot { background: currentColor; }
  </style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <button class="back-btn" onclick="goHome()" aria-label="Volver">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <span class="hdr-title">Metrónomo</span>
  </div>

  <div class="content">

    <!-- Pulse card -->
    <div class="pulse-card">
      <div id="pulse-grid" class="pulse-grid"></div>
      <div class="pulses-row">
        <span class="pulses-label">Pulsos: <strong id="pulses-count">4</strong></span>
        <input type="range" id="pulses-slider" min="1" max="16" value="4">
        <button class="sound-btn on" id="accent-btn" onclick="toggleAccent()" title="Acento en primer pulso">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
            <ellipse cx="7" cy="18" rx="4" ry="3" transform="rotate(-15 7 18)"/>
            <rect x="10.5" y="3" width="2" height="15" rx="1"/>
            <path d="M12.5 3 Q20 5 20 11 Q20 14 16 14 L12.5 14"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- BPM section -->
    <div class="bpm-section">
      <span class="bpm-label">BPM</span>
      <div class="bpm-row">
        <button class="bpm-btn" id="bpm-minus" aria-label="Reducir BPM">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <span class="bpm-value" id="bpm-display">80</span>
        <button class="bpm-btn" id="bpm-plus" aria-label="Aumentar BPM">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <input type="range" class="bpm-slider" id="bpm-slider" min="1" max="320" value="80">
      <span class="tempo-name" id="tempo-name">Andante</span>
    </div>

  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <button class="icon-btn" onclick="openSettings()" aria-label="Ajustes">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <button class="play-btn" id="play-btn" onclick="togglePlay()" aria-label="Iniciar / Detener">
      <svg id="play-icon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
      <svg id="stop-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" hidden>
        <rect x="4" y="4" width="16" height="16" rx="2"/>
      </svg>
    </button>

    <button class="icon-btn" id="tap-btn" onclick="tapTempo()" aria-label="Tap tempo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/>
        <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/>
        <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/>
        <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
      </svg>
    </button>
  </div>

</div>

<!-- Settings overlay -->
<div id="settings-overlay" class="overlay" onclick="_overlayClick(event)">
  <div class="settings-sheet">
    <div class="sheet-hdr">
      <div class="sheet-handle"></div>
      <span class="sheet-title">Ajustes</span>
    </div>
    <span class="settings-group-label">Tipo de sonido</span>
    <div class="sound-options">
      <button class="sound-opt active" id="snd-click" onclick="setSoundType('click')">
        <span class="sound-opt-dot"></span>Clic mecánico
      </button>
      <button class="sound-opt" id="snd-beep" onclick="setSoundType('beep')">
        <span class="sound-opt-dot"></span>Pitido electrónico
      </button>
      <button class="sound-opt" id="snd-wood" onclick="setSoundType('wood')">
        <span class="sound-opt-dot"></span>Bloque de madera
      </button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────
let bpm        = 80;
let pulses     = 4;
let intensities = [3, 3, 3, 3]; // per-beat intensity 0–3
let isPlaying  = false;
let accentOn   = true;
let soundType  = 'click';

// ── Audio scheduler (Web Audio API lookahead pattern) ─────────
let audioCtx     = null;
let nextBeatTime = 0;
let currentBeat  = 0;
let schedTimer   = null;

const LOOKAHEAD_MS   = 25;
const SCHEDULE_AHEAD = 0.1;

// Gain multipliers for intensities 0–3
const GAIN = [0, 0.35, 0.65, 1.0];

function ctx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(beat, time) {
  const intensity = intensities[beat] ?? 3;
  if (intensity === 0) return; // silent beat

  const ac        = ctx();
  const gainMult  = GAIN[intensity];
  const isAccent  = accentOn && beat === 0;

  if (soundType === 'beep') {
    const osc = ac.createOscillator();
    const env = ac.createGain();
    osc.type = 'sine';
    osc.frequency.value = isAccent ? 880 : 660;
    env.gain.setValueAtTime(0, time);
    env.gain.linearRampToValueAtTime(0.45 * gainMult, time + 0.004);
    env.gain.exponentialRampToValueAtTime(0.001, time + 0.07);
    osc.connect(env); env.connect(ac.destination);
    osc.start(time); osc.stop(time + 0.08);

  } else if (soundType === 'wood') {
    const len = Math.round(ac.sampleRate * 0.045);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const bpf = ac.createBiquadFilter();
    bpf.type = 'bandpass'; bpf.frequency.value = isAccent ? 700 : 450; bpf.Q.value = 3;
    const g = ac.createGain(); g.gain.value = (isAccent ? 2.8 : 2.0) * gainMult;
    src.connect(bpf); bpf.connect(g); g.connect(ac.destination);
    src.start(time);

  } else {
    // click — filtered noise burst
    const len = Math.round(ac.sampleRate * 0.025);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const bpf = ac.createBiquadFilter();
    bpf.type = 'bandpass'; bpf.frequency.value = isAccent ? 1800 : 1100; bpf.Q.value = 0.9;
    const g = ac.createGain(); g.gain.value = (isAccent ? 1.8 : 1.3) * gainMult;
    src.connect(bpf); bpf.connect(g); g.connect(ac.destination);
    src.start(time);
  }

  // Schedule visual update
  const delay = Math.max(0, (time - ac.currentTime) * 1000);
  setTimeout(() => flashBeat(beat), delay);
}

function scheduler() {
  const ac = ctx();
  while (nextBeatTime < ac.currentTime + SCHEDULE_AHEAD) {
    playSound(currentBeat, nextBeatTime);
    // For silent beats, still schedule visual
    if (intensities[currentBeat] === 0) {
      const beat = currentBeat;
      const delay = Math.max(0, (nextBeatTime - ac.currentTime) * 1000);
      setTimeout(() => flashBeat(beat), delay);
    }
    nextBeatTime += 60 / bpm;
    currentBeat = (currentBeat + 1) % pulses;
  }
}

function startMetronome() {
  const ac = ctx();
  if (ac.state === 'suspended') ac.resume();
  isPlaying    = true;
  currentBeat  = 0;
  nextBeatTime = ac.currentTime + 0.05;
  resetGrid();
  schedTimer = setInterval(scheduler, LOOKAHEAD_MS);
  updatePlayBtn();
}

function stopMetronome() {
  isPlaying = false;
  clearInterval(schedTimer);
  schedTimer = null;
  resetGrid();
  updatePlayBtn();
}

function togglePlay() { isPlaying ? stopMetronome() : startMetronome(); }

// ── Pulse grid ────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('pulse-grid');
  const cols = Math.min(pulses, 8);
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.innerHTML = '';

  for (let i = 0; i < pulses; i++) {
    const bar  = document.createElement('div');
    bar.className     = 'pulse-bar';
    bar.dataset.index = i;
    bar.dataset.intensity = intensities[i] ?? 3;

    const fill = document.createElement('div');
    fill.className = 'bar-fill';
    bar.appendChild(fill);

    attachBarDrag(bar);
    grid.appendChild(bar);
  }
}

// ── Bar drag interaction ───────────────────────────────────────
function attachBarDrag(bar) {
  let dragging = false;

  bar.addEventListener('pointerdown', e => {
    e.preventDefault();
    dragging = true;
    bar.setPointerCapture(e.pointerId);
    // Disable fill transition during drag for immediate feedback
    bar.querySelector('.bar-fill').style.transition = 'none';
    applyIntensityFromPointer(bar, e);
  });

  bar.addEventListener('pointermove', e => {
    if (!dragging) return;
    applyIntensityFromPointer(bar, e);
  });

  const onEnd = () => {
    if (!dragging) return;
    dragging = false;
    // Re-enable transition after drag ends
    bar.querySelector('.bar-fill').style.transition = '';
  };
  bar.addEventListener('pointerup',     onEnd);
  bar.addEventListener('pointercancel', onEnd);
}

function applyIntensityFromPointer(bar, e) {
  const rect = bar.getBoundingClientRect();
  // y=0 at top (max intensity), y=height at bottom (min)
  const pct       = 1 - Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height));
  const intensity = Math.round(pct * 3);
  const idx       = parseInt(bar.dataset.index, 10);

  if (intensities[idx] === intensity) return; // no change
  intensities[idx]      = intensity;
  bar.dataset.intensity = intensity;
}

// ── Beat visualization ────────────────────────────────────────
let prevBeat = -1;

function flashBeat(beat) {
  const bars = document.querySelectorAll('.pulse-bar');
  if (!bars.length || beat >= bars.length) return;

  // On cycle restart, reset all bars to base state
  if (beat === 0) {
    bars.forEach(b => b.classList.remove('played', 'current', 'flash'));
  }

  // Mark previous bar as played
  if (prevBeat >= 0 && prevBeat < bars.length && prevBeat !== beat) {
    bars[prevBeat].classList.remove('current', 'flash');
    bars[prevBeat].classList.add('played');
  }

  // Flash current bar
  const bar = bars[beat];
  bar.classList.remove('played');
  bar.classList.add('flash');
  setTimeout(() => {
    bar.classList.remove('flash');
    bar.classList.add('current');
  }, 80);

  prevBeat = beat;
}

function resetGrid() {
  prevBeat = -1;
  document.querySelectorAll('.pulse-bar').forEach(b =>
    b.classList.remove('played', 'current', 'flash')
  );
}

// ── Tempo names ───────────────────────────────────────────────
const TEMPO_MARKS = [
  [168, 'Prestissimo'], [141, 'Presto'],     [133, 'Vivace'],
  [110, 'Allegro'],     [98,  'Allegretto'], [86,  'Moderato'],
  [73,  'Andante'],     [61,  'Adagio'],     [46,  'Larghetto'],
  [25,  'Largo'],       [1,   'Larghissimo'],
];

function getTempoName(b) {
  for (const [min, name] of TEMPO_MARKS) if (b >= min) return name;
  return 'Larghissimo';
}

// ── BPM control ───────────────────────────────────────────────
function setBpm(v) {
  bpm = Math.max(1, Math.min(320, Math.round(v)));
  document.getElementById('bpm-display').textContent = bpm;
  document.getElementById('tempo-name').textContent  = getTempoName(bpm);
  const sl = document.getElementById('bpm-slider');
  sl.value = bpm;
  updateSliderFill(sl);
}

function updateSliderFill(el) {
  const pct = ((el.value - el.min) / (el.max - el.min)) * 100;
  el.style.setProperty('--fill', pct + '%');
}

function updatePlayBtn() {
  const btn = document.getElementById('play-btn');
  btn.classList.toggle('playing', isPlaying);
  document.getElementById('play-icon').hidden = isPlaying;
  document.getElementById('stop-icon').hidden = !isPlaying;
}

// ── Long-press on ± buttons ───────────────────────────────────
function setupLongPress(id, delta) {
  const btn = document.getElementById(id);
  let hold, rate;
  const step    = () => setBpm(bpm + delta);
  const onStart = () => { step(); hold = setTimeout(() => { rate = setInterval(step, 55); }, 380); };
  const onEnd   = () => { clearTimeout(hold); clearInterval(rate); };
  btn.addEventListener('pointerdown',   onStart);
  btn.addEventListener('pointerup',     onEnd);
  btn.addEventListener('pointerleave',  onEnd);
  btn.addEventListener('pointercancel', onEnd);
}

// ── Tap tempo ─────────────────────────────────────────────────
const taps = [];
let tapClear;

function tapTempo() {
  const now = Date.now();
  taps.push(now);
  clearTimeout(tapClear);
  tapClear = setTimeout(() => { taps.length = 0; }, 2500);

  const tapBtn = document.getElementById('tap-btn');
  tapBtn.classList.add('tapped');
  setTimeout(() => tapBtn.classList.remove('tapped'), 130);

  if (taps.length >= 2) {
    const intervals = [];
    for (let i = 1; i < taps.length; i++) intervals.push(taps[i] - taps[i - 1]);
    const recent = intervals.slice(-6);
    const avg    = recent.reduce((a, b) => a + b, 0) / recent.length;
    setBpm(Math.round(60000 / avg));
  }
}

// ── Accent toggle ─────────────────────────────────────────────
function toggleAccent() {
  accentOn = !accentOn;
  document.getElementById('accent-btn').classList.toggle('on', accentOn);
}

// ── Sound type ────────────────────────────────────────────────
function setSoundType(type) {
  soundType = type;
  ['click', 'beep', 'wood'].forEach(t =>
    document.getElementById('snd-' + t).classList.toggle('active', t === type)
  );
}

// ── Settings overlay ──────────────────────────────────────────
function openSettings() {
  window.parent?.postMessage({ type: 'PHYSIQ_WIDGET_HIDE' }, '*');
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
  window.parent?.postMessage({ type: 'PHYSIQ_WIDGET_SHOW' }, '*');
}
function _overlayClick(e) {
  if (e.target === e.currentTarget) closeSettings();
}

// ── Navigation ────────────────────────────────────────────────
function goHome() {
  if (isPlaying) stopMetronome();
  window.parent.postMessage({ type: 'PHYSIQ_GO_HOME' }, '*');
}

window.addEventListener('message', e => {
  if (e.data?.type === 'PHYSIQ_SAT_VISIBLE') { /* no-op */ }
});

// ── Pulse count change ────────────────────────────────────────
document.getElementById('pulses-slider').addEventListener('input', e => {
  const newPulses = parseInt(e.target.value, 10);
  // Preserve existing intensities, fill new slots with 3
  const prev = intensities.slice();
  intensities = Array.from({ length: newPulses }, (_, i) =>
    i < prev.length ? prev[i] : 3
  );
  pulses = newPulses;
  document.getElementById('pulses-count').textContent = pulses;
  updateSliderFill(e.target);
  if (isPlaying) currentBeat = 0;
  buildGrid();
  if (isPlaying) resetGrid();
});

// ── Init ──────────────────────────────────────────────────────
document.getElementById('bpm-slider').addEventListener('input', e => {
  setBpm(parseInt(e.target.value, 10));
});

setupLongPress('bpm-minus', -1);
setupLongPress('bpm-plus',  +1);

setBpm(80);
buildGrid();
updateSliderFill(document.getElementById('pulses-slider'));
</script>
