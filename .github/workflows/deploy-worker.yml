name: Deploy Copilot Worker

# Deploys worker/physiq-copilot.js to Cloudflare Workers.
# Triggers automatically when the worker changes on main, and can be run
# manually from the Actions tab (workflow_dispatch) for the first deploy.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token with the "Edit Cloudflare Workers" permission
#   CLOUDFLARE_ACCOUNT_ID  — Cloudflare account id

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
