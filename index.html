<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhysiQ</title>
  <link rel="icon" href="/physiq/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/physiq/manifest.json">
  <meta name="theme-color" content="#1e2d3d">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: system-ui, sans-serif; background: #0a0d12; color: #e8edf2; }

    /* ── Home view ─────────────────────────────────── */
    #home { display: flex; flex-direction: column; padding: 3rem 1.5rem 5rem; min-height: 100dvh; }

    header { margin-bottom: 3rem; }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #fff;
    }
    h1 span {
      background: linear-gradient(135deg, #4f9cf9, #38d9a9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    nav { display: flex; flex-direction: column; gap: 0.75rem; }

    .app-card {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.1rem 1.25rem; border-radius: 10px;
      background: #111620; color: inherit;
      border: none; cursor: pointer; width: 100%; text-align: left;
      transition: background 0.15s;
    }
    .app-card:active { background: #171e2e; }

    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .app-info { display: flex; flex-direction: column; gap: 0.2rem; }
    .app-name { font-size: 1rem; font-weight: 600; color: #fff; }
    .app-desc { font-size: 0.78rem; color: #8aa4bc; }

    /* ── Satellite shell ────────────────────────────── */
    #sat-shell { position: fixed; top: 0; bottom: 0; left: 0; right: 0; z-index: 10; }
    .sat-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

    /* ── Recorder widget ────────────────────────────── */
    #rec-widget {
      position: fixed;
      z-index: 300;
      display: flex; align-items: center; gap: 2px;
      background: rgba(13,21,33,0.97);
      border: 1px solid #283849; border-radius: 999px;
      padding: 5px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.3);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      font-family: system-ui, sans-serif;
      user-select: none; white-space: nowrap;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #rec-widget[data-state="recording"] {
      border-color: rgba(239,68,68,0.45);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 4px 24px rgba(239,68,68,0.2);
    }
    #rec-widget[data-state="paused"] {
      border-color: rgba(251,146,60,0.45);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 4px 24px rgba(251,146,60,0.16);
    }
    #rec-widget[data-state="stopped"] {
      border-color: rgba(56,217,169,0.4);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 4px 24px rgba(56,217,169,0.14);
    }
    #rec-widget[data-error] {
      border-color: rgba(239,68,68,0.7);
      animation: rw-shake 0.4s ease-in-out;
    }
    @keyframes rw-shake {
      0%,100%{transform:none}
      25%{transform:translateX(-6px)}
      75%{transform:translateX(6px)}
    }

    /* ── Drag handle ────────────────────────────────── */
    .rw-handle {
      display: flex; align-items: center; justify-content: center;
      width: 20px; height: 42px; flex-shrink: 0;
      color: #2e4458;
      cursor: grab; touch-action: none;
      border-radius: 999px;
      transition: color 0.15s;
    }
    .rw-handle:hover { color: #4a6580; }
    #rec-widget.rw-dragging .rw-handle { cursor: grabbing; }
    #rec-widget.rw-dragging { transition: none !important; }
    #rec-widget.rw-snapping {
      transition: left .35s cubic-bezier(.34,1.56,.64,1),
                  top  .35s cubic-bezier(.34,1.56,.64,1),
                  border-color .3s, box-shadow .3s !important;
    }

    /* State-driven visibility — explicit per element */
    #rec-widget .rw-status, #rec-widget .rw-sep,
    #rec-widget .rw-pause,  #rec-widget .rw-resume,
    #rec-widget .rw-stop,
    #rec-widget .rw-trash,  #rec-widget .rw-confirm { display: none; }

    #rec-widget:not([data-state="idle"]) > .rw-start { display: none; }

    #rec-widget[data-state="recording"] > .rw-status,
    #rec-widget[data-state="paused"]    > .rw-status,
    #rec-widget[data-state="stopped"]   > .rw-status { display: flex; }

    #rec-widget[data-state="recording"] > .rw-sep,
    #rec-widget[data-state="paused"]    > .rw-sep,
    #rec-widget[data-state="stopped"]   > .rw-sep { display: block; }

    #rec-widget[data-state="recording"] > .rw-pause  { display: flex; }
    #rec-widget[data-state="paused"]    > .rw-resume { display: flex; }

    #rec-widget[data-state="recording"] > .rw-stop,
    #rec-widget[data-state="paused"]    > .rw-stop   { display: flex; }

    #rec-widget[data-state="recording"] > .rw-trash,
    #rec-widget[data-state="paused"]    > .rw-trash,
    #rec-widget[data-state="stopped"]   > .rw-trash  { display: flex; }

    /* confirm — misma especificidad (1,2,0) pero posterior → gana sobre las reglas de estado */
    #rec-widget[data-confirm] > .rw-status  { display: none; }
    #rec-widget[data-confirm] > .rw-sep     { display: none; }
    #rec-widget[data-confirm] > .rw-pause   { display: none; }
    #rec-widget[data-confirm] > .rw-resume  { display: none; }
    #rec-widget[data-confirm] > .rw-stop    { display: none; }
    #rec-widget[data-confirm] > .rw-trash   { display: none; }
    #rec-widget[data-confirm] > .rw-confirm { display: flex; }

    /* Buttons */
    .rw-btn {
      width: 42px; height: 42px; border-radius: 50%;
      border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #c8d8e8; flex-shrink: 0;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .rw-btn:hover  { background: rgba(255,255,255,0.09); }
    .rw-btn:active { background: rgba(255,255,255,0.16); transform: scale(0.88); }

    .rw-start { color: #d8e8f4; }
    .rw-start:hover { background: rgba(79,156,249,0.14); color: #4f9cf9; }

    .rw-stop  { color: #7a95b0; }
    .rw-stop:hover  { background: rgba(239,68,68,0.1); color: #f87171; }

    .rw-trash { color: #4a6580; }
    .rw-trash:hover { background: rgba(239,68,68,0.1); color: #ef4444; }

    /* Status */
    .rw-status { display: flex; align-items: center; gap: 7px; padding: 0 6px 0 10px; }
    .rw-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    [data-state="recording"] .rw-dot { background: #ef4444; animation: rw-blink 1.1s ease-in-out infinite; }
    [data-state="paused"]    .rw-dot { background: #fb923c; }
    [data-state="stopped"]   .rw-dot { background: #38d9a9; }
    @keyframes rw-blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    .rw-timer-wrap { display: inline-flex; align-items: center; }
    .rw-timer-top  { display: contents; }
    .rw-timer-mm, .rw-timer-ss, .rw-timer-col {
      font-size: 0.82rem; font-variant-numeric: tabular-nums; color: #c8d8e8;
    }
    .rw-timer-mm, .rw-timer-ss { min-width: 1.4rem; text-align: center; }

    .rw-sep { width: 1px; height: 20px; background: #283849; margin: 0 3px; flex-shrink: 0; }

    /* Confirm */
    .rw-confirm { align-items: center; gap: 2px; padding: 0 4px; }
    .rw-confirm-label { display: none; font-size: 0.8rem; color: #8aa4bc; padding: 0 6px; }
    #rec-widget[data-corner="top-center"]    .rw-confirm-label,
    #rec-widget[data-corner="bottom-center"] .rw-confirm-label { display: inline; }
    .rw-confirm-yes { color: #ef4444 !important; font-size: 0.85rem; font-weight: 600; }
    .rw-confirm-no  { color: #8aa4bc  !important; font-size: 0.85rem; }
    .rw-confirm-yes, .rw-confirm-no { width: auto; height: 42px; padding: 0 14px; border-radius: 999px; }

    /* ── Vertical (side) layout ──────────────────────── */
    #rec-widget.rw-vertical { flex-direction: column; }
    #rec-widget.rw-vertical .rw-handle { width: 36px; height: 16px; }
    #rec-widget.rw-vertical .rw-btn    { width: 36px; height: 36px; }
    #rec-widget.rw-vertical .rw-status { flex-direction: column; align-items: center; padding: 4px 0; gap: 3px; }
    #rec-widget.rw-vertical .rw-sep    { width: 20px; height: 1px; margin: 2px 0; }
    #rec-widget.rw-vertical .rw-timer-wrap { flex-direction: column; align-items: flex-end; line-height: 1.15; }
    #rec-widget.rw-vertical .rw-timer-top  { display: inline-flex; }
    #rec-widget.rw-vertical .rw-timer-col  { display: none; }
    #rec-widget.rw-vertical .rw-confirm         { flex-direction: column; align-items: center; padding: 2px 0; }
    #rec-widget.rw-vertical .rw-confirm-label   { display: none; }
    #rec-widget.rw-vertical .rw-confirm-yes,
    #rec-widget.rw-vertical .rw-confirm-no      { width: 36px; height: 36px; padding: 0; border-radius: 50%; }

    @media (max-width: 767px) {
      #rec-widget .rw-timer-wrap                          { display: none; }
      #rec-widget.rw-timer-on .rw-timer-wrap              { display: inline-flex; }
      #rec-widget.rw-vertical.rw-timer-on .rw-timer-wrap  { display: flex; }
    }
  </style>
</head>
<body>

<!-- ── Home view ───────────────────────────────────────── -->
<div id="home">
  <header>
    <h1>Physi<span>Q</span></h1>
  </header>
  <nav>
    <button class="app-card" onclick="openSat('report')">
      <span class="dot" style="background:#10b981"></span>
      <div class="app-info">
        <span class="app-name">Informe con IA</span>
        <span class="app-desc">Generación de informes asistida</span>
      </div>
    </button>
    <button class="app-card" onclick="openSat('assessment')">
      <span class="dot" style="background:#3b82f6"></span>
      <div class="app-info">
        <span class="app-name">Valoración clínica</span>
        <span class="app-desc">Exploración y registro de hallazgos</span>
      </div>
    </button>
    <button class="app-card" onclick="openSat('motion')">
      <span class="dot" style="background:#8b5cf6"></span>
      <div class="app-info">
        <span class="app-name">ROM · Inclinómetro</span>
        <span class="app-desc">Medición de rango articular</span>
      </div>
    </button>
  </nav>
</div>

<!-- ── Satellite shell ──────────────────────────────────── -->
<div id="sat-shell" hidden>
  <iframe id="sat-motion"     class="sat-frame" allow="microphone" hidden></iframe>
  <iframe id="sat-assessment" class="sat-frame" allow="microphone" hidden></iframe>
  <iframe id="sat-report"     class="sat-frame" allow="microphone" hidden></iframe>
</div>

<!-- ── Recorder widget ─────────────────────────────────── -->
<div id="rec-widget" data-state="idle">

  <!-- drag handle -->
  <span class="rw-handle" aria-hidden="true">
    <svg width="8" height="12" viewBox="0 0 8 12" fill="currentColor">
      <circle cx="2" cy="2"  r="1.2"/><circle cx="6" cy="2"  r="1.2"/>
      <circle cx="2" cy="6"  r="1.2"/><circle cx="6" cy="6"  r="1.2"/>
      <circle cx="2" cy="10" r="1.2"/><circle cx="6" cy="10" r="1.2"/>
    </svg>
  </span>

  <!-- idle -->
  <button class="rw-btn rw-start" onclick="recCmd('start')" title="Iniciar grabación" aria-label="Iniciar grabación">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
    </svg>
  </button>

  <!-- status: dot + timer -->
  <div class="rw-status">
    <span class="rw-dot"></span>
    <div class="rw-timer-wrap"><span class="rw-timer-top"><span class="rw-timer-mm">00</span><span class="rw-timer-col">:</span></span><span class="rw-timer-ss">00</span></div>
  </div>

  <span class="rw-sep"></span>

  <!-- recording: pause -->
  <button class="rw-btn rw-pause" onclick="recCmd('pause')" title="Pausar" aria-label="Pausar grabación">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
      <rect x="6" y="4" width="4" height="16" rx="1"/>
      <rect x="14" y="4" width="4" height="16" rx="1"/>
    </svg>
  </button>

  <!-- paused: resume -->
  <button class="rw-btn rw-resume" onclick="recCmd('resume')" title="Reanudar" aria-label="Reanudar grabación">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
      <path d="M8 5v14l11-7z"/>
    </svg>
  </button>

  <!-- recording + paused: stop -->
  <button class="rw-btn rw-stop" onclick="recCmd('stop')" title="Detener" aria-label="Detener grabación">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
      <rect x="4" y="4" width="16" height="16" rx="2"/>
    </svg>
  </button>

  <!-- recording + paused + stopped: discard -->
  <button class="rw-btn rw-trash" onclick="showDiscardConfirm()" title="Descartar grabación" aria-label="Descartar grabación">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/>
      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
      <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
    </svg>
  </button>

  <!-- confirm discard -->
  <div class="rw-confirm">
    <span class="rw-confirm-label">¿Descartar?</span>
    <button class="rw-btn rw-confirm-yes" onclick="recCmd('discard')" aria-label="Confirmar descarte">Sí</button>
    <button class="rw-btn rw-confirm-no"  onclick="hideDiscardConfirm()" aria-label="Cancelar">No</button>
  </div>

</div>

<script>
// ── Navigation ───────────────────────────────────────────
const SATS = { motion: '/physiq/motion/', assessment: '/physiq/assessment/', report: '/physiq/report/' };

function _showSat(name) {
  const frame = document.getElementById('sat-' + name);
  if (!frame.src) frame.src = SATS[name];
  Object.keys(SATS).forEach(k => { document.getElementById('sat-' + k).hidden = k !== name; });
  document.getElementById('sat-shell').hidden = false;
  document.getElementById('home').hidden = true;
}

function _showHome() {
  document.getElementById('sat-shell').hidden = true;
  document.getElementById('home').hidden = false;
  Object.keys(SATS).forEach(k => { document.getElementById('sat-' + k).hidden = true; });
}

function openSat(name) {
  if (!SATS[name]) return;
  const frame = document.getElementById('sat-' + name);
  frame.src = SATS[name];
  Object.keys(SATS).forEach(k => { document.getElementById('sat-' + k).hidden = k !== name; });
  document.getElementById('sat-shell').hidden = false;
  document.getElementById('home').hidden = true;
  history.pushState({ hub: 'sat', sat: name }, '', '/physiq/?sat=' + name);
}

function goHome() {
  _showHome();
  history.replaceState({ hub: 'home' }, '', '/physiq/');
}

window.addEventListener('popstate', e => {
  if (e.state?.hub === 'sat') _showSat(e.state.sat);
  else _showHome();
});

window.addEventListener('message', e => {
  if (e.data?.type === 'PHYSIQ_NAVIGATE') openSat(e.data.to);
  if (e.data?.type === 'PHYSIQ_GO_HOME') goHome();
  if (e.data?.type === 'PHYSIQ_WIDGET_HIDE') document.getElementById('rec-widget').style.visibility = 'hidden';
  if (e.data?.type === 'PHYSIQ_WIDGET_SHOW') document.getElementById('rec-widget').style.visibility = '';
});

(function restoreState() {
  history.replaceState({ hub: 'home' }, '', '/physiq/');
  const sat = new URLSearchParams(location.search).get('sat');
  if (sat && SATS[sat]) openSat(sat);
}());

// ── Recorder engine ──────────────────────────────────────
const _ch = new BroadcastChannel('physiq-recorder');
let _mr = null, _stream = null, _chunks = [], _blob = null;
let _mimeType = '', _duration = 0, _timer = null;
let _discarding = false, _recState = 'idle';

_ch.onmessage = e => { if (e.data?.cmd) _handleCmd(e.data.cmd); };

function recCmd(cmd) { _handleCmd(cmd); }

async function _handleCmd(cmd) {
  switch (cmd) {
    case 'start':   await _start(); break;
    case 'pause':   _pause();       break;
    case 'resume':  _resume();      break;
    case 'stop':    _stop();        break;
    case 'discard': _discard();     break;
  }
}

async function _start() {
  if (_recState !== 'idle') return;
  try {
    _stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    _mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/mp4';
    _mr = new MediaRecorder(_stream, { mimeType: _mimeType });
    _chunks = []; _duration = 0; _discarding = false;
    _mr.ondataavailable = e => { if (e.data.size) _chunks.push(e.data); };
    _mr.onstop = _onStop;
    _mr.start(1000);
    _startTimer();
    _setState('recording');
  } catch (err) {
    console.warn('Micrófono no disponible:', err);
    const w = document.getElementById('rec-widget');
    w.dataset.error = '1';
    setTimeout(() => delete w.dataset.error, 2500);
  }
}

function _startTimer() {
  clearInterval(_timer);
  _timer = setInterval(() => {
    _duration++;
    _setTimer(_duration);
    _broadcast();
  }, 1000);
}

function _pause() {
  if (_recState !== 'recording') return;
  _mr.pause();
  clearInterval(_timer);
  _setState('paused');
}

function _resume() {
  if (_recState !== 'paused') return;
  _mr.resume();
  _startTimer();
  _setState('recording');
}

function _stop() {
  if (_recState !== 'recording' && _recState !== 'paused') return;
  clearInterval(_timer);
  if (_mr && _mr.state !== 'inactive') _mr.stop();
}

function _onStop() {
  if (_discarding) { _discarding = false; return; }
  _blob = new Blob(_chunks, { type: _mimeType });
  if (_stream) { _stream.getTracks().forEach(t => t.stop()); _stream = null; }
  _mr = null;
  _saveToIDB();
  _setState('stopped');
}

function _discard() {
  clearInterval(_timer);
  if (_mr) {
    _discarding = true;
    if (_mr.state !== 'inactive') _mr.stop();
    _mr = null;
  }
  if (_stream) { _stream.getTracks().forEach(t => t.stop()); _stream = null; }
  _chunks = []; _blob = null; _duration = 0;
  _openIDB().then(db => {
    try {
      db.transaction('audio', 'readwrite').objectStore('audio').delete('pending');
    } catch (_) {}
    db.close();
  }).catch(() => {});
  hideDiscardConfirm();
  _setState('idle');
}

function _setState(s) {
  _recState = s;
  _broadcast();
  _updateWidget();
}

function _broadcast() {
  _ch.postMessage({ type: 'RECORDER_STATE', state: _recState, duration: _duration, hasAudio: !!_blob });
}

// ── IDB ──────────────────────────────────────────────────
function _openIDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('physiq', 2);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('audio'))   db.createObjectStore('audio');
      if (!db.objectStoreNames.contains('session')) db.createObjectStore('session');
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}

async function _saveToIDB() {
  const ext = _mimeType.includes('mp4') ? 'mp4' : 'webm';
  const db  = await _openIDB();
  const tx  = db.transaction('audio', 'readwrite');
  tx.objectStore('audio').put(
    { blob: _blob, name: 'physiq-recording.' + ext, type: _mimeType, duration: _duration },
    'pending'
  );
  db.close();
}

// ── Widget UI ─────────────────────────────────────────────
function _setTimer(s) {
  document.querySelector('.rw-timer-mm').textContent = String(Math.floor(s / 60)).padStart(2, '0');
  document.querySelector('.rw-timer-ss').textContent = String(s % 60).padStart(2, '0');
}

function _updateWidget() {
  const w = document.getElementById('rec-widget');
  w.dataset.state = _recState;
  delete w.dataset.confirm;
  _setTimer(_duration);
}

function showDiscardConfirm() {
  document.getElementById('rec-widget').dataset.confirm = '1';
}

function hideDiscardConfirm() {
  delete document.getElementById('rec-widget').dataset.confirm;
}

// ── SW ────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/physiq/sw.js', { scope: '/physiq/' });
}

// ── Draggable widget ──────────────────────────────────────
(function () {
  const w      = document.getElementById('rec-widget');
  const handle = w.querySelector('.rw-handle');
  let moved = false;
  let px0 = 0, py0 = 0, wx0 = 0, wy0 = 0;

  function snapPoints() {
    const vw = window.innerWidth,  vh = window.innerHeight;
    const ww = w.offsetWidth,      wh = w.offsetHeight;
    return {
      'top-left':      { left: 16,               top: 16 },
      'top-center':    { left: (vw - ww) / 2,    top: 16 },
      'top-right':     { left: vw - ww - 16,     top: 16 },
      'middle-left':   { left: 16,               top: (vh - wh) / 2 },
      'middle-right':  { left: vw - ww - 16,     top: (vh - wh) / 2 },
      'bottom-left':   { left: 16,               top: vh - wh - 24 },
      'bottom-center': { left: (vw - ww) / 2,    top: vh - wh - 24 },
      'bottom-right':  { left: vw - ww - 16,     top: vh - wh - 24 },
    };
  }

  function goCorner(key, animate) {
    w.classList.toggle('rw-vertical', !key.includes('center'));
    w.dataset.corner = key;
    requestAnimationFrame(() => {
      const pts = snapPoints();
      if (!pts[key]) return;
      if (animate) {
        w.classList.add('rw-snapping');
        setTimeout(() => w.classList.remove('rw-snapping'), 400);
      }
      w.style.left = pts[key].left + 'px';
      w.style.top  = pts[key].top  + 'px';
    });
  }

  function snapNearest() {
    const r   = w.getBoundingClientRect();
    const cx  = r.left + r.width  / 2;
    const cy  = r.top  + r.height / 2;
    const pts = snapPoints();
    const ww  = w.offsetWidth, wh = w.offsetHeight;
    let nearest = 'bottom-center', minDist = Infinity;
    for (const [key, pos] of Object.entries(pts)) {
      const d = Math.hypot(cx - (pos.left + ww / 2), cy - (pos.top + wh / 2));
      if (d < minDist) { minDist = d; nearest = key; }
    }
    goCorner(nearest, true);
    localStorage.setItem('rw-corner', nearest);
  }

  requestAnimationFrame(() => {
    const saved = localStorage.getItem('rw-corner') || 'bottom-center';
    goCorner(saved, false);
    localStorage.setItem('rw-corner', saved);
  });

  window.addEventListener('resize', () => {
    goCorner(w.dataset.corner || 'bottom-center', false);
  });

  handle.addEventListener('pointerdown', e => {
    moved = false;
    px0 = e.clientX; py0 = e.clientY;
    const r = w.getBoundingClientRect();
    wx0 = r.left; wy0 = r.top;
    handle.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  handle.addEventListener('pointermove', e => {
    const dx = e.clientX - px0, dy = e.clientY - py0;
    if (!moved && Math.hypot(dx, dy) < 5) return;
    if (!moved) { moved = true; w.classList.add('rw-dragging'); }
    const vw = window.innerWidth, vh = window.innerHeight;
    w.style.left = Math.max(0, Math.min(vw - w.offsetWidth,  wx0 + dx)) + 'px';
    w.style.top  = Math.max(0, Math.min(vh - w.offsetHeight, wy0 + dy)) + 'px';
  });

  handle.addEventListener('pointerup', () => {
    w.classList.remove('rw-dragging');
    if (moved) { moved = false; snapNearest(); }
  });

  handle.addEventListener('pointercancel', () => {
    w.classList.remove('rw-dragging');
    moved = false;
  });

  // Tap dot to reveal timer on small screens
  function _refit() {
    const c = w.dataset.corner;
    if (c) goCorner(c, false);
  }

  let _timerHideId;
  w.querySelector('.rw-status').addEventListener('click', () => {
    if (window.innerWidth >= 768) return;
    clearTimeout(_timerHideId);
    if (w.classList.contains('rw-timer-on')) {
      w.classList.remove('rw-timer-on');
      _refit();
    } else {
      w.classList.add('rw-timer-on');
      _refit();
      _timerHideId = setTimeout(() => { w.classList.remove('rw-timer-on'); _refit(); }, 3000);
    }
  });

  // Refit when widget expands (state change, confirm overlay)
  new MutationObserver(() => {
    requestAnimationFrame(() => {
      const c = w.dataset.corner;
      if (c) goCorner(c, false);
    });
  }).observe(w, { attributes: true, attributeFilter: ['data-state', 'data-confirm'] });
}());
</script>
</body>
</html>
