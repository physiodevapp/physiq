<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PhysiQ · Wiki</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d12;
    --surface: #111620;
    --surface2: #171e2e;
    --border: #232d45;
    --border2: #2d3a56;
    --text: #e8eaf0;
    --text2: #8892a4;
    --text3: #5a6478;
    --accent: #4f9cf9;
    --accent2: #38d9a9;
    --wiki-accent: #6366f1;
    --green: #38d9a9;
    --green-bg: rgba(56,217,169,0.12);
    --yellow: #fb923c;
    --yellow-bg: rgba(251,146,60,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --radius: 12px;
    --radius-sm: 8px;
    --header-h: 64px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* HEADER */
  .app-header {
    background: rgba(10,13,18,0.92);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    height: var(--header-h);
    padding: 0 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-back {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 26px;
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    display: none;
    transition: color 0.15s;
    font-weight: 300;
  }
  .header-back:hover { color: var(--text); }

  .logo-wrap { flex: 1; }
  .logo-main {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text);
    line-height: 1.1;
  }
  .logo-main .logo-accent { color: var(--wiki-accent); }
  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* HOME */
  .home-intro {
    padding: 24px 20px 6px;
  }
  .home-intro h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.25;
  }
  .home-intro p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 6px;
    line-height: 1.55;
  }

  .legend {
    display: flex;
    gap: 10px;
    padding: 12px 20px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text2);
  }

  .regions-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 8px 20px 40px;
  }

  .region-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .region-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--wiki-accent);
    opacity: 0.6;
  }
  .region-card:active { transform: scale(0.97); }
  .region-card:hover { border-color: var(--border2); }

  .region-card-icon { font-size: 22px; margin-bottom: 8px; }
  .region-card-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .region-card-count {
    font-size: 11px;
    color: var(--text3);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }
  .region-card-green {
    font-size: 11px;
    color: var(--accent2);
    font-weight: 500;
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }

  /* REGION VIEW */
  .filter-bar {
    padding: 10px 20px;
    background: rgba(10,13,18,0.88);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: sticky;
    top: var(--header-h);
    z-index: 90;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  .filter-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
    font-family: 'Outfit', sans-serif;
  }
  .filter-btn.active {
    background: var(--wiki-accent);
    border-color: var(--wiki-accent);
    color: #fff;
  }

  .region-content {
    padding: 12px 20px 48px;
  }

  .category-section { margin-bottom: 20px; }
  .category-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    padding: 4px 0 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .test-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 8px;
    border-radius: var(--radius-sm);
    transition: background 0.1s;
    user-select: none;
    -webkit-touch-callout: none;
  }
  .test-item:active { background: var(--surface2); }
  .test-item.hidden { display: none; }

  .evidence-badge {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    flex-shrink: 0;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
  }
  .ev-green  { background: var(--green-bg);  color: var(--green); }
  .ev-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .ev-red    { background: var(--red-bg);    color: var(--red); }

  .test-name {
    flex: 1;
    font-size: 13px;
    line-height: 1.35;
    color: var(--text);
  }
  .test-item.ev-green-row .test-name { font-weight: 500; }

  .test-link-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    text-decoration: none;
    font-size: 12px;
    transition: opacity 0.15s;
  }
  .test-link-btn.has-link {
    background: #ff0000;
    color: #fff;
  }
  .test-link-btn.no-link {
    background: var(--surface2);
    color: var(--text3);
    font-size: 11px;
    cursor: default;
  }
  .test-link-btn.has-link:active { opacity: 0.75; }

  .no-green-notice {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    padding: 4px 8px 2px;
    font-style: italic;
    margin-top: 2px;
  }

  /* LINK EDIT SHEET */
  #link-sheet {
    position: fixed; inset: 0; z-index: 200;
    display: none;
  }
  #link-sheet-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
  }
  .link-sheet-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    max-width: 480px; margin: 0 auto;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 20px 20px 40px;
  }
  .link-sheet-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .link-sheet-name {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 14px;
    line-height: 1.4;
  }
  .link-sheet-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    outline: none;
    margin-bottom: 6px;
  }
  .link-sheet-input:focus { border-color: var(--wiki-accent); }
  .link-sheet-hint {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 16px;
  }
  .link-sheet-actions {
    display: flex;
    gap: 10px;
  }
  .link-sheet-cancel, .link-sheet-save {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius-sm);
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
  }
  .link-sheet-cancel { background: var(--surface2); color: var(--text2); }
  .link-sheet-save { background: var(--wiki-accent); color: #fff; }

  /* IN-HUB */
  @keyframes hub-back-hint {
    0%   { transform: translateX(0); }
    35%  { transform: translateX(-5px); }
    65%  { transform: translateX(1px); }
    100% { transform: translateX(0); }
  }
  .in-hub .logo-main { cursor: pointer; transition: opacity 0.15s; }
  .in-hub .logo-main::before {
    content: '‹';
    display: inline-block;
    margin-right: 8px;
    color: var(--wiki-accent);
    opacity: 0.7;
    animation: hub-back-hint 0.7s ease-out 0.5s 1 both;
  }
  .in-hub .logo-main:hover { opacity: 0.75; }
</style>
</head>

</div>

<!-- REGION VIEW -->
<div id="view-region" style="display:none">

  </div>
  <div class="region-content" id="region-content"></div>
</div>

<!-- LINK EDIT SHEET -->
<div id="link-sheet">

  <div class="link-sheet-panel">
    <div class="link-sheet-title">Enlace del test</div>
    <div class="link-sheet-name" id="link-sheet-name"></div>

    <div class="link-sheet-hint">Deja vac&iacute;o para restaurar el enlace original</div>
    <div class="link-sheet-actions">
      <button class="link-sheet-cancel" onclick="closeLinkSheet()">Cancelar</button>
      <button class="link-sheet-save" onclick="saveLinkOverride()">Guardar</button>
    </div>
  </div>
</div>

// ─── STATE ───────────────────────────────────────────────────────────────────────────────────
let currentRegion = null;
let currentFilter = 'all';
let _linkOverrides = JSON.parse(localStorage.getItem('physiq-wiki-links') || '{}');
let _editingTestId = null;
let _lpTimer = null;
let _lpX = 0, _lpY = 0;

// ─── RENDER HOME ────────────────────────────────────────────────────────────────────────────────────────
function renderHome() {
  const grid = document.getElementById('regions-grid');
  grid.innerHTML = REGIONS.map(region => {
    const allTests = region.categories.flatMap(c => c.tests);
    const greenCount = allTests.filter(t => t.ev === 'green').length;
    return `
      <div class="region-card" onclick="showRegion('${region.id}')">
        <div class="region-card-icon">${region.icon}</div>
        <div class="region-card-name">${region.name}</div>
        <div class="region-card-count">${allTests.length} tests</div>
        <div class="region-card-green">✓ ${greenCount} alta evidencia</div>
      </div>
    `;
  }).join('');
}

// ─── NAVIGATION ────────────────────────────────────────────────────────────────────────────────────────
function showRegion(regionId) {
  currentRegion = REGIONS.find(r => r.id === regionId);
  currentFilter = 'all';

  document.getElementById('view-home').style.display = 'none';
  document.getElementById('view-region').style.display = 'block';
  document.getElementById('btn-back').style.display = 'block';
  document.getElementById('header-title').innerHTML = 'PhysiQ <span class="logo-accent">— Wiki</span>';
  document.getElementById('header-subtitle').textContent = currentRegion.name;

  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.filter-btn')[0].classList.add('active');

  renderRegion();
  window.scrollTo(0, 0);
}

function showHome() {
  document.getElementById('view-home').style.display = 'block';
  document.getElementById('view-region').style.display = 'none';
  document.getElementById('btn-back').style.display = 'none';
  document.getElementById('header-title').innerHTML = 'PhysiQ <span class="logo-accent">— Wiki</span>';
  document.getElementById('header-subtitle').textContent = '';
  currentRegion = null;
  window.scrollTo(0, 0);
}

// ─── RENDER REGION ───────────────────────────────────────────────────────────────────────────────────────────
function renderRegion() {
  const content = document.getElementById('region-content');
  content.innerHTML = currentRegion.categories.map(cat => {
    const hasGreen = cat.tests.some(t => t.ev === 'green');
    const testsHTML = cat.tests.map(test => {
      const ev = test.ev;
      const badgeClass  = ev === 'green' ? 'ev-green'  : ev === 'yellow' ? 'ev-yellow' : 'ev-red';
      const badgeSymbol = ev === 'green' ? '✓' : ev === 'yellow' ? '!' : '?';
      const rowClass    = ev === 'green' ? 'ev-green-row' : '';
      const hidden      = currentFilter === 'green' && ev !== 'green' ? 'hidden' : '';

      const effectiveLink = _linkOverrides[test.id] !== undefined ? _linkOverrides[test.id] : test.link;
      const linkBtn = effectiveLink
        ? `<a class="test-link-btn has-link" href="${effectiveLink}" target="_blank" rel="noopener" onclick="event.stopPropagation()">▶</a>`
        : `<span class="test-link-btn no-link">&ndash;</span>`;

      return `
        <div class="test-item ${rowClass} ${hidden}" data-ev="${ev}" data-id="${test.id}">
          <span class="evidence-badge ${badgeClass}">${badgeSymbol}</span>
          <span class="test-name">${test.name}</span>
          ${linkBtn}
        </div>
      `;
    }).join('');

    const noGreenNotice = hasGreen ? '' : '<div class="no-green-notice">Sin tests de alta evidencia</div>';

    return `
      <div class="category-section">
        <div class="category-title">${cat.name}</div>
        ${testsHTML}
        ${noGreenNotice}
      </div>
    `;
  }).join('');
}

// ─── FILTER ──────────────────────────────────────────────────────────────────────────────────────────
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.querySelectorAll('.test-item').forEach(item => {
    if (filter === 'green') {
      item.classList.toggle('hidden', item.dataset.ev !== 'green');
    } else {
      item.classList.remove('hidden');
    }
  });
}

// ─── LINK EDIT ────────────────────────────────────────────────────────────────────────────────────────────
function _findTestById(id) {
  for (const r of REGIONS) {
    for (const c of r.categories) {
      const t = c.tests.find(t => t.id === id);
      if (t) return t;
    }
  }
  return null;
}

function openLinkSheet(testId) {
  _editingTestId = testId;
  const test = _findTestById(testId);
  const current = _linkOverrides[testId] !== undefined ? _linkOverrides[testId] : (test?.link || '');
  document.getElementById('link-sheet-name').textContent = test?.name || '';
  document.getElementById('link-input').value = current;
  document.getElementById('link-sheet').style.display = 'block';
  setTimeout(() => document.getElementById('link-input').focus(), 80);
}

function closeLinkSheet() {
  document.getElementById('link-sheet').style.display = 'none';
  _editingTestId = null;
}

function saveLinkOverride() {
  if (!_editingTestId) return;
  const url = document.getElementById('link-input').value.trim();
  if (url === '') {
    delete _linkOverrides[_editingTestId];
  } else {
    _linkOverrides[_editingTestId] = url;
  }
  localStorage.setItem('physiq-wiki-links', JSON.stringify(_linkOverrides));
  closeLinkSheet();
  renderRegion();
}

// ─── HUB INTEGRATION ─────────────────────────────────────────────────────────────────────────────────────────
try {
  if (window.self !== window.top) {
    document.body.classList.add('in-hub');
    document.querySelector('.logo-main').addEventListener('click', () => {
      window.parent.postMessage({ type: 'PHYSIQ_GO_HOME' }, '*');
    });
  }
} catch (_) {
  document.body.classList.add('in-hub');
}

// ─── LONG-PRESS TO EDIT LINK ──────────────────────────────────────────────────────────────────────────────────────
document.getElementById('region-content').addEventListener('pointerdown', e => {
  const item = e.target.closest('.test-item');
  if (!item) return;
  const testId = item.dataset.id;
  if (!testId) return;

  _lpX = e.clientX; _lpY = e.clientY;
  _lpTimer = setTimeout(() => {
    _lpTimer = null;
    navigator.vibrate?.(50);
    openLinkSheet(testId);
  }, 500);

  const cancel = () => { if (_lpTimer) { clearTimeout(_lpTimer); _lpTimer = null; } };
  document.addEventListener('pointerup',     cancel, { once: true });
  document.addEventListener('pointercancel', cancel, { once: true });
});

document.addEventListener('pointermove', e => {
  if (!_lpTimer) return;
  if (Math.hypot(e.clientX - _lpX, e.clientY - _lpY) > 8) {
    clearTimeout(_lpTimer); _lpTimer = null;
  }
});

document.getElementById('region-content').addEventListener('contextmenu', e => {
  if (e.target.closest('.test-item')) e.preventDefault();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────────────────────────────
renderHome();
</script>
